<html>
    <head>
        <title>PRIME Management</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta property="og:title" content="PRIME Management">
        <meta property="og:description" content="FC 모바일 프라임 클랜 관리 시스템">
        <meta property="og:image" content="resources/PRIME_Management.png">
        <link rel="shortcut icon" href="favicon.ico">
        <script src="https://code.jquery.com/jquery-3.6.3.min.js" integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script src = "https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
        <link href='https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css' rel="stylesheet" />
        <link rel="stylesheet" href="styles.css">
        <script src="https://www.gstatic.com/firebasejs/8.8.1/firebase-app.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.8.1/firebase-database.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.8.1/firebase-analytics.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.8.1/firebase-auth.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.8.1/firebase-firestore.js"></script>
        <script src="./scripts/firebase.js"></script>
        <script>
            $(document).ready(function(){
                $(document).bind('keydown',function(e){
                    if ( e.keyCode == 123) {
                        e.preventDefault();
                        e.returnValue = false;
                    }
                });
            });
        </script>
    </head>
    <body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">
        <div class="mainDiv">
            <div class="loginForm">
                <div class="logoDiv">
                    <img class="logoImg" src="./resources/PRIME_Management.png">
                </div>
                <div class="inputDiv">
                    <input class="inputId" type="text" list="id-list" placeholder="아이디(이메일)">
                    <datalist id="id-list">
                        <option value="prime@prime.com"></option>
                        <option value="prime2@prime.com"></option>
                        <option value="primev1@prime.com"></option>
                        <option value="primev2@prime.com"></option>
                        <option value="primev3@prime.com"></option>
                        <option value="primev4@prime.com"></option>
                        <option value="primev5@prime.com"></option>
                        <option value="primerest@prime.com"></option>
                        <option value="member@prime.com"></option>
                    </datalist>
                </div>
                <div class="inputDiv">
                    <input class="inputPw" type="password" placeholder="비밀번호">
                </div>
                <div class="inputDiv" id="btnDiv" onclick="normalLogin();">
                    <div class="btn">로그인</button>
                </div>
            </div>
        </div>
    </body>
</html>
